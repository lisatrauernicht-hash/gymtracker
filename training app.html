<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f12">
<meta name="description" content="Persönlicher Gym Tracker">

<title>Training</title>
<style>
#splash{position:fixed;inset:0;background:#0f0f12;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash-icon{font-size:80px;margin-bottom:16px;animation:splashpulse 1s ease-in-out infinite}
#splash-title{font-size:24px;font-weight:700;color:#f0f0f0;letter-spacing:-0.5px}
#splash-sub{font-size:13px;color:#888;margin-top:6px}
@keyframes splashpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f12;--card:#1a1a1f;--card2:#222228;--border:rgba(255,255,255,0.07);
  --text:#f0f0f0;--muted:#888;--muted2:#444;--radius:18px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
  --cr:#f4ede0;--cr2:#ece3d0;--cr3:#e0d5bf;--crt:#2c2218;--crm:#8a7560;--crb:rgba(44,34,24,0.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;padding:calc(var(--safe-top)+16px) 16px calc(var(--safe-bottom)+80px)}
.screen.active{display:flex}
#screen-session{background:var(--cr)}
.heading{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.subheading{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.caption{font-size:12px;color:var(--muted)}
.card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border)}
input[type=number]{background:rgba(255,255,255,0.06);border:0.5px solid var(--border);border-radius:10px;padding:9px 8px;font-size:14px;width:100%;color:var(--text);text-align:center;-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:rgba(255,255,255,0.2)}
input::placeholder{color:var(--muted2)}
.btn{display:block;width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer;text-align:center}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text);border:0.5px solid var(--border)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,18,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding:10px 0 calc(var(--safe-bottom)+4px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;color:var(--muted);font-weight:500}
.nav-item.active .nav-label{color:#fff;font-weight:600}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav{background:var(--card2);border:0.5px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-label{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:0 0 8px;letter-spacing:0.5px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;font-size:15px;font-weight:500;position:relative}
.cal-day:active{opacity:0.7}
.cal-day.other-month{color:var(--muted2);cursor:default}
.session-dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{padding:14px 10px;border-radius:14px;text-align:center;background:var(--card2);border:0.5px solid var(--border)}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}

/* DAY */
.tag-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;margin-bottom:10px;position:relative;overflow:hidden}
.tag-card:active{opacity:0.8}
.tag-emoji{font-size:30px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0;background:rgba(255,255,255,0.06)}
.tag-glow{position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;opacity:0.1;filter:blur(20px)}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}

/* SESSION — cream theme */
.sess-back{background:var(--cr2);border:0.5px solid var(--crb);border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--crt);flex-shrink:0}
.sess-prog-bg{height:3px;border-radius:2px;background:var(--cr3);margin-bottom:16px;overflow:hidden}
.sess-prog-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

/* EXERCISE CARD — slim elegant */
.ex-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;border:0.5px solid var(--crb);box-shadow:0 1px 4px rgba(44,34,24,0.07)}
.ex-strip{height:4px}
.ex-head{padding:11px 14px 9px;border-bottom:0.5px solid var(--crb);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ex-head-left{flex:1}
.ex-type-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.5px;padding:2px 8px;border-radius:20px;margin-bottom:5px;text-transform:uppercase}
.ex-name{font-size:15px;font-weight:700;color:var(--crt);letter-spacing:-0.2px;margin-bottom:2px}
.ex-sub{font-size:12px;color:var(--crm)}
.ex-pause-line{font-size:11px;color:var(--crm);margin-top:4px;opacity:0.8}
.ex-best{text-align:right;flex-shrink:0}
.ex-best-lbl{font-size:10px;color:var(--crm);letter-spacing:0.3px}
.ex-best-val{font-size:16px;font-weight:700;color:var(--crt)}
.ex-body{background:var(--cr);padding:10px 12px}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:#fff;border:0.5px solid var(--crb);margin-bottom:5px;transition:all 0.15s}
.set-row:last-child{margin-bottom:0}
.set-row.done{border-color:rgba(44,34,24,0.2)}
.set-lbl{font-size:11px;font-weight:600;color:var(--crm);width:46px;flex-shrink:0;letter-spacing:0.3px}
.set-inp{flex:1;display:flex;gap:5px}
.set-inp input{flex:1;background:var(--cr);border:0.5px solid var(--crb);border-radius:8px;padding:7px 5px;font-size:14px;color:var(--crt);text-align:center;-webkit-appearance:none}
.set-inp input::placeholder{color:var(--cr3)}
.set-inp input:focus{outline:none;border-color:rgba(44,34,24,0.3)}
.set-chk{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--cr3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 0.15s}

/* BAUCH + WATER */
.extra-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#fff;border-radius:13px;border:0.5px solid var(--crb);margin-bottom:8px;box-shadow:0 1px 3px rgba(44,34,24,0.05)}
.extra-title{font-size:15px;font-weight:600;color:var(--crt)}
.extra-sub{font-size:12px;color:var(--crm);margin-top:1px}
.bauch-chk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--cr3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.15s;cursor:pointer}
.water-ctrl{display:flex;align-items:center;gap:8px;margin-left:auto}
.water-btn{width:30px;height:30px;border-radius:9px;border:0.5px solid var(--crb);background:var(--cr2);color:var(--crt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.water-num{font-size:17px;font-weight:700;min-width:42px;text-align:center;color:#4a7fa5}

/* SAVE BTN */
.save-btn{display:block;width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;text-align:center;color:#fff;letter-spacing:-0.2px;margin-bottom:8px;box-shadow:0 3px 10px rgba(0,0,0,0.15)}

/* HISTORY */
.hist-card{padding:14px 16px;margin-bottom:8px}
.hist-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.hist-pill{font-size:11px;padding:3px 9px;border-radius:20px}

/* ANALYSE */
.prog-item{margin-bottom:14px}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-bar-bg{background:rgba(255,255,255,0.06);border-radius:4px;height:5px}
.prog-bar-fill{height:5px;border-radius:4px}
.ai-text{font-size:14px;line-height:1.75;color:var(--text)}
.spinner-dots{display:flex;gap:6px;justify-content:center;padding:2rem}
.spinner-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease-in-out infinite}
.spinner-dot:nth-child(2){animation-delay:0.2s}
.spinner-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}
.saved-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(12px)}

/* TIMER */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(16px)}
.timer-overlay.show{display:flex}
.timer-ring{position:relative;width:180px;height:180px;margin-bottom:24px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:700}
.timer-skip{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 32px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="splash">
  <div id="splash-icon">💪</div>
  <div id="splash-title">Training</div>
  <div id="splash-sub">Wird geladen...</div>
</div>

<!-- CALENDAR -->
<div class="screen active" id="screen-cal">
  <div class="cal-header">
    <button class="cal-nav" id="prev-month">&#8249;</button>
    <div style="text-align:center">
      <div style="font-size:20px;font-weight:700;letter-spacing:-0.3px" id="cal-title"></div>
      <div class="caption" id="cal-year"></div>
    </div>
    <button class="cal-nav" id="next-month">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="today-preview" style="margin-top:20px"></div>
</div>

<!-- DAY -->
<div class="screen" id="screen-day">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button class="cal-nav" onclick="showScreen('cal');setNav('cal')">&#8249;</button>
    <div>
      <div class="subheading" id="day-title"></div>
      <div class="caption" id="day-sub"></div>
    </div>
  </div>
  <div id="day-existing"></div>
  <div style="font-size:13px;color:var(--muted);font-weight:500;margin-bottom:10px">Training wählen:</div>
  <div id="tag-buttons"></div>
  <button class="btn btn-ghost" style="margin-top:6px" onclick="markRest()">😴 Ruhetag eintragen</button>
</div>

<!-- SESSION -->
<div class="screen" id="screen-session">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <button class="sess-back" id="sess-back">&#8249;</button>
    <div style="flex:1">
      <div style="font-size:17px;font-weight:700;color:var(--crt);letter-spacing:-0.3px" id="sess-title"></div>
      <div style="font-size:12px;color:var(--crm);margin-top:1px" id="sess-date"></div>
    </div>
    <div id="sess-pill"></div>
  </div>
  <div class="sess-prog-bg"><div class="sess-prog-fill" id="sess-prog" style="width:0%"></div></div>
  <div id="sess-exercises"></div>
  <div class="extra-row" id="bauch-row" onclick="toggleBauch()" style="cursor:pointer">
    <div class="bauch-chk" id="bauch-box"></div>
    <div>
      <div class="extra-title">Bauch gemacht</div>
      <div class="extra-sub">Heute Bauchtraining erledigt?</div>
    </div>
  </div>
  <div class="extra-row" id="periode-row" onclick="togglePeriode()" style="cursor:pointer">
    <div class="bauch-chk" id="periode-box"></div>
    <div>
      <div class="extra-title">Periode</div>
      <div class="extra-sub">Heute Periode gehabt?</div>
    </div>
  </div>

  <div class="extra-row">
    <div style="font-size:22px">💧</div>
    <div>
      <div class="extra-title">Wasser getrunken</div>
      <div class="extra-sub">Wie viel Liter heute?</div>
    </div>
    <div class="water-ctrl">
      <button class="water-btn" onclick="changeWater(-0.25)">−</button>
      <div class="water-num" id="water-val">0 L</div>
      <button class="water-btn" onclick="changeWater(+0.25)">+</button>
    </div>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveSession()">Training speichern ✓</button>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div style="margin-bottom:20px">
    <div class="heading">Historie</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px" id="hist-count"></div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div id="hist-list"></div>
</div>

<!-- ANALYSE -->
<div class="screen" id="screen-analyse">
  <div style="margin-bottom:20px">
    <div class="heading">Analyse</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px" id="analyse-sub"></div>
  </div>
  <div id="analyse-content"></div>
</div>

<!-- GEWICHT -->
<div class="screen" id="screen-gewicht">
  <div style="margin-bottom:24px">
    <div class="heading">Körpergewicht</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">Morgens nach dem Aufstehen</div>
  </div>
  <div style="background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:24px;text-align:center;margin-bottom:16px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px" id="gw-date"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px">
      <button onclick="gwChange(-0.1)" style="width:48px;height:48px;border-radius:14px;background:var(--card2);border:0.5px solid var(--border);color:var(--text);font-size:24px;cursor:pointer">−</button>
      <div id="gw-display" style="font-size:52px;font-weight:700;letter-spacing:-2px;min-width:140px">–</div>
      <button onclick="gwChange(+0.1)" style="width:48px;height:48px;border-radius:14px;background:var(--card2);border:0.5px solid var(--border);color:var(--text);font-size:24px;cursor:pointer">+</button>
    </div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:20px" id="gw-diff"></div>
    <button onclick="gwSave()" id="gw-save-btn" style="width:100%;padding:14px;border-radius:14px;border:none;background:#7a5a3a;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Gewicht speichern</button>
  </div>
  <div style="background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px" id="gw-history-box">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Verlauf</div>
    <div id="gw-history"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-cal" onclick="showScreen('cal');setNav('cal')">
    <span class="nav-icon">📅</span><span class="nav-label">Kalender</span>
  </button>
  <button class="nav-item" id="nav-history" onclick="showScreen('history');renderHistory();setNav('history')">
    <span class="nav-icon">📋</span><span class="nav-label">Historie</span>
  </button>
  <button class="nav-item" id="nav-gewicht" onclick="showScreen('gewicht');renderGewicht();setNav('gewicht')">
    <span class="nav-icon">⚖️</span><span class="nav-label">Gewicht</span>
  </button>
  <button class="nav-item" id="nav-analyse" onclick="showScreen('analyse');renderAnalyse();setNav('analyse')">
    <span class="nav-icon">📊</span><span class="nav-label">Analyse</span>
  </button>
</div>

<!-- TIMER -->
<div class="timer-overlay" id="timer-overlay">
  <div style="font-size:15px;color:#888;margin-bottom:20px">Pause</div>
  <div class="timer-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="82" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
      <circle id="timer-fill" cx="90" cy="90" r="82" fill="none" stroke-width="8" stroke-linecap="round"/>
    </svg>
    <div class="timer-num" id="timer-num">90</div>
  </div>
  <div style="font-size:17px;font-weight:600;color:#fff;margin-bottom:28px;text-align:center;padding:0 20px" id="timer-next"></div>
  <button class="timer-skip" onclick="skipTimer()">Überspringen</button>
</div>

var DAYS=["Mo","Di","Mi","Do","Fr","Sa","So"];
var WEEKDAYS=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

function save(){var data=JSON.stringify(sessions);try{localStorage.setItem("ts",data);}catch(e){}try{sessionStorage.setItem("ts_backup",data);}catch(e){}}
function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtShort(s){var p=s.split("-");return p[2]+"."+p[1]+"."+p[0];}
function fmtLong(s){var p=s.split("-");var d=new Date(p[0],p[1]-1,p[2]);return WEEKDAYS[d.getDay()]+", "+p[2]+". "+MONTHS[p[1]-1];}
function showScreen(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById("screen-"+id).classList.add("active");window.scrollTo(0,0);}
function setNav(id){document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});var el=document.getElementById("nav-"+id);if(el)el.classList.add("active");}
function getDaySessions(date){return Object.entries(sessions).filter(function(e){return e[0].indexOf(date)===0;}).map(function(e){return Object.assign({key:e[0]},e[1]);});}
function getBest(tag,idx){var best=0;Object.values(sessions).filter(function(s){return s.tag===tag&&s.data;}).forEach(function(s){var sets=s.data[idx]||[];sets.forEach(function(set){var kg=parseFloat(set.kg);if(!isNaN(kg)&&kg>best)best=kg;});});return best>0?best+"kg":"–";}
function getCount(tag){return Object.values(sessions).filter(function(s){return s.tag===tag;}).length;}
function getStreak(){var t=today();var p=t.split("-").map(Number);var streak=0;var d=new Date(p[0],p[1]-1,p[2]);while(true){var str=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");var s=getDaySessions(str).filter(function(s){return s.tag&&!s.rest;});if(s.length>0){streak++;d.setDate(d.getDate()-1);}else break;}return streak;}
function typeLabel(t){return t==="compound"?"Hauptübung":t==="finish"?"Finish":"Isolation";}
function pauseText(t){return t==="compound"?"⏱ 2 Min Pause":t==="finish"?"⏱ 45 Sek Pause":"⏱ 75 Sek Pause";}

function updateProgress(){
  if(!curData||!curTag)return;
  var plan=PLAN[curTag];var total=0,done=0;
  plan.exercises.forEach(function(ex,i){curData[i].forEach(function(set){total++;if(set.kg&&set.reps)done++;});});
  var pct=total>0?Math.round(done/total*100):0;

}

// TIMER
function startTimer(secs,nextText,color){
  if(timerInt)clearInterval(timerInt);
  timerTotal=secs;var rem=secs;
  var circ=2*Math.PI*82;
  var fill=document.getElementById("timer-fill");
  fill.style.stroke=color;fill.style.strokeDasharray=circ;fill.style.strokeDashoffset=0;
  document.getElementById("timer-num").textContent=rem;
  document.getElementById("timer-next").textContent=nextText;
  document.getElementById("timer-overlay").classList.add("show");
  timerInt=setInterval(function(){
    rem--;document.getElementById("timer-num").textContent=rem;
    fill.style.strokeDashoffset=circ*(1-rem/timerTotal);
    if(rem<=0){clearInterval(timerInt);try{var ctx=new AudioContext();var osc=ctx.createOscillator();var g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);osc.start();osc.stop(ctx.currentTime+0.5);}catch(e){}document.getElementById("timer-overlay").classList.remove("show");}
  },1000);
}

// CALENDAR
function renderCalendar(){
  var t=today();var tp=t.split("-").map(Number);
  if(!curYear){curYear=tp[0];curMonth=tp[1];}
  document.getElementById("cal-title").textContent=MONTHS[curMonth-1];
  document.getElementById("cal-year").textContent=curYear;
  var grid=document.getElementById("cal-grid");grid.innerHTML="";
  DAYS.forEach(function(d){var el=document.createElement("div");el.className="cal-day-label";el.textContent=d;grid.appendChild(el);});
  var first=new Date(curYear,curMonth-1,1).getDay();
  var off=first===0?6:first-1;
  var dim=new Date(curYear,curMonth,0).getDate();
  var prev=new Date(curYear,curMonth-1,0).getDate();
  for(var i=0;i<off;i++){var el=document.createElement("div");el.className="cal-day other-month";el.textContent=prev-off+1+i;grid.appendChild(el);}
  for(var d=1;d<=dim;d++){
    var ds=curYear+"-"+String(curMonth).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var el=document.createElement("div");el.className="cal-day";el.textContent=d;
    var daySess=getDaySessions(ds);var isToday=ds===t;
    if(isToday){var ts=daySess.filter(function(s){return s.tag&&PLAN[s.tag];});el.style.background=ts.length>0?PLAN[ts[0].tag].strip:"rgba(255,255,255,0.15)";el.style.color="#fff";el.style.fontWeight="700";}
    if(daySess.length>0&&!isToday){
      var ts=daySess.filter(function(s){return s.tag&&PLAN[s.tag];});
      if(ts.length>0){el.style.color=PLAN[ts[0].tag].strip;var dot=document.createElement("div");dot.className="session-dot";dot.style.background=PLAN[ts[0].tag].strip;el.appendChild(dot);}
      var hasPeriode=daySess.some(function(s){return s.periode;});
      if(hasPeriode){var pdot=document.createElement("div");pdot.style.cssText="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#9b4a6a";el.appendChild(pdot);}
    }
    (function(ds){el.onclick=function(){openDay(ds);};})(ds);
    grid.appendChild(el);
  }
  var rem=42-off-dim;for(var i=1;i<=rem;i++){var el=document.createElement("div");el.className="cal-day other-month";el.textContent=i;grid.appendChild(el);}
  renderTodayPreview();
}

function prefillLastSession(){
  if(!curTag)return;
  var past=Object.values(sessions).filter(function(s){return s.tag===curTag&&s.data&&!s.rest;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  if(past.length===0)return;
  var last=past[0];
  PLAN[curTag].exercises.forEach(function(ex,i){
    if(last.data&&last.data[i]){
      var lastSets=last.data[i];
      curData[i].forEach(function(set,j){
        if(lastSets[j]){
          curData[i][j].kg=lastSets[j].kg||"";
          curData[i][j].reps=lastSets[j].reps||"";
        }
      });
    }
  });
}

function getWeightSuggestion(tag, exIdx, ex){
  var past = Object.values(sessions).filter(function(s){
    return s.tag===tag && s.data && s.data[exIdx] && !s.rest;
  }).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,3);
  
  if(past.length < 3) return null;
  
  var targetRepsMax = parseInt((ex.reps||"").toString().split("–")[1]) || parseInt(ex.reps) || 12;
  var allHitTarget = past.every(function(s){
    var sets = s.data[exIdx] || [];
    var filledSets = sets.filter(function(set){ return set.kg && set.reps; });
    if(filledSets.length === 0) return false;
    var avgReps = filledSets.reduce(function(a,b){ return a + (parseFloat(b.reps)||0); }, 0) / filledSets.length;
    return avgReps >= targetRepsMax * 0.9;
  });
  
  if(!allHitTarget) return null;
  
  var lastSets = past[0].data[exIdx] || [];
  var lastKg = Math.max.apply(null, lastSets.map(function(s){ return parseFloat(s.kg)||0; }));
  if(lastKg === 0) return null;
  
  var increase = ex.type === "compound" ? 2.5 : 1.25;
  if(lastKg >= 50) increase = ex.type === "compound" ? 5 : 2.5;
  
  return lastKg + increase;
}
function renderSessionExercises(){
  var plan=PLAN[curTag];
  document.getElementById("sess-exercises").innerHTML=plan.exercises.map(function(ex,i){
    var best=getBest(curTag,i);
    var suggestion=getWeightSuggestion(curTag,i,ex);
    var isComp=ex.type==="compound";
    var stripColor=isComp?plan.strip:plan.badge;
    var badgeBg=isComp?plan.strip:plan.badge;
    var badgeColor=isComp?"#fff":plan.badgeText;

    var setsHtml=curData[i].map(function(set,j){
      var done=!!(set.kg&&set.reps);
      return'<div class="set-row'+(done?" done":"")+'" id="sr-'+i+'-'+j+'">'
        +'<div class="set-lbl">SATZ '+(j+1)+'</div>'
        +'<div class="set-inp">'
        +'<input type="number" placeholder="kg" value="'+set.kg+'" inputmode="decimal" onchange="updSet('+i+','+j+',\'kg\',this.value,'+ex.pause+',\''+ex.name+'\')">'
        +'<input type="number" placeholder="Wdh" value="'+set.reps+'" inputmode="numeric" onchange="updSet('+i+','+j+',\'reps\',this.value,'+ex.pause+',\''+ex.name+'\',true)">'
        +'</div>'
        +'<div class="set-chk" id="chk-'+i+'-'+j+'" style="'+(done?"background:"+plan.strip+";border-color:"+plan.strip+";color:#fff":"")+'">'+( done?"✓":"")+'</div>'
        +'</div>';
    }).join("");

    return'<div class="ex-card">'
      +'<div class="ex-strip" style="background:'+stripColor+'"></div>'
      +'<div class="ex-head">'
      +'<div class="ex-head-left">'
      +'<span class="ex-type-badge" style="background:'+badgeBg+';color:'+badgeColor+'">'+typeLabel(ex.type)+'</span>'
      +'<div class="ex-name">'+ex.name+'</div>'
      +'<div class="ex-sub">'+ex.muscle+' · '+ex.sets+'×'+ex.reps+'</div>'
      +'<div class="ex-pause-line">'+pauseText(ex.type)+'</div>'
      +'</div>'
      +'<div class="ex-best"><div class="ex-best-lbl">Bestleistung</div><div class="ex-best-val">'+best+'</div>'+(suggestion?'<div style="font-size:10px;margin-top:3px;color:#4a7a4a;font-weight:600">↑ '+suggestion+'kg?</div>':'')+'</div>'
      +'</div>'
      +'<div class="ex-body">'+setsHtml+'</div>'
      +'</div>';
  }).join("");
}

function updSet(exIdx,setIdx,field,value,pauseSecs,exName,isReps){
  curData[exIdx][setIdx][field]=value;
  var s=curData[exIdx][setIdx];var done=!!(s.kg&&s.reps);
  var row=document.getElementById("sr-"+exIdx+"-"+setIdx);
  var chk=document.getElementById("chk-"+exIdx+"-"+setIdx);
  var plan=PLAN[curTag];
  if(row)row.classList.toggle("done",done);
  if(chk){if(done){chk.style.background=plan.strip;chk.style.borderColor=plan.strip;chk.style.color="#fff";chk.textContent="✓";}else{chk.style.background="";chk.style.borderColor="var(--cr3)";chk.style.color="";chk.textContent="";}}
  updateProgress();
  if(isReps&&value&&curData[exIdx][setIdx].kg)startTimer(pauseSecs,"Nächster Satz: "+exName,plan.strip);
}

function saveSession(){
  var key=selDate+"_"+curTag+"_"+Date.now();
  sessions[key]={date:selDate,tag:curTag,data:curData,bauch:bauchDone,wasser:waterLiter,periode:periodeDone,gewicht:bodyWeight>0?bodyWeight:null};save();
  var plan=PLAN[curTag];
  var totalVol=0;
  PLAN[curTag].exercises.forEach(function(ex,i){
    curData[i].forEach(function(set){
      var kg=parseFloat(set.kg)||0;var reps=parseFloat(set.reps)||0;
      totalVol+=kg*reps;
    });
  });
  var volStr=totalVol>0?(totalVol>=1000?(totalVol/1000).toFixed(1)+"t":Math.round(totalVol)+"kg"):"";
  var ov=document.createElement("div");ov.className="saved-overlay";
  ov.innerHTML='<div style="font-size:60px;margin-bottom:20px">'+plan.emoji+'</div><div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:8px">Gespeichert! 💪</div><div style="font-size:15px;color:#888;margin-bottom:6px">'+curTag+' · '+fmtShort(selDate)+'</div>'+(waterLiter>0?'<div style="font-size:13px;color:#4a7fa5;margin-bottom:4px">💧 '+( waterLiter%1===0?waterLiter:waterLiter.toFixed(2).replace(/0+$/,""))+' L Wasser</div>':'')+( bauchDone?'<div style="font-size:13px;color:#6a9a6a;margin-bottom:20px">✓ Bauch gemacht</div>':'<div style="margin-bottom:20px"></div>')+'<button style="width:200px;padding:14px;border-radius:14px;border:none;background:'+plan.strip+';color:#fff;font-size:15px;font-weight:600;cursor:pointer" onclick="this.parentElement.remove();showScreen(\'cal\');renderCalendar();setNav(\'cal\')">Fertig</button>';
  document.body.appendChild(ov);checkTrigger();
}
function checkTrigger(){var count=Object.values(sessions).filter(function(s){return s.tag&&!s.rest;}).length;if(count>0&&count%20===0){setTimeout(function(){if(confirm("🎉 "+count+" Einheiten!\nZeit für deine 4-Wochen-Analyse?")){showScreen("analyse");renderAnalyse();setNav("analyse");}},800);}}

// HISTORY
function renderHistory(){
  var list=Object.entries(sessions).map(function(e){return Object.assign({key:e[0]},e[1]);}).filter(function(s){return!s.rest&&s.tag;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  document.getElementById("hist-count").textContent=list.length+" Einheiten gespeichert";
  var tc={};Object.keys(PLAN).forEach(function(t){tc[t]=0;});list.forEach(function(s){if(tc[s.tag]!==undefined)tc[s.tag]++;});
  document.getElementById("stats-grid").innerHTML=Object.entries(PLAN).map(function(e){var tag=e[0];var info=e[1];return'<div class="stat-card" style="border-top:2px solid '+info.strip+'"><div class="stat-num" style="color:'+info.strip+'">'+tc[tag]+'</div><div class="stat-label">'+info.emoji+' '+tag+'</div></div>';}).join("");
  if(list.length===0){document.getElementById("hist-list").innerHTML='<div style="text-align:center;padding:3rem"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:15px;font-weight:600">Noch keine Einheiten</div></div>';return;}
  document.getElementById("hist-list").innerHTML=list.map(function(s){
    var plan=PLAN[s.tag];
    var pills=plan.exercises.map(function(ex,i){var sets=(s.data&&s.data[i])?s.data[i]:[];var best=Math.max.apply(null,sets.map(function(set){return parseFloat(set.kg)||0;}));return best>0?'<span class="hist-pill" style="color:'+plan.strip+';background:'+plan.bg+'">'+ex.name.split(" ")[0]+" "+best+'kg</span>':null;}).filter(Boolean).slice(0,4).join("");
    var bauchB=s.bauch?'<span class="hist-pill" style="color:#4a7a4a;background:rgba(74,122,74,0.1)">✓ Bauch</span>':'';
    var periodeB=s.periode?'<span class="hist-pill" style="color:#9b4a6a;background:rgba(155,74,106,0.1)">🌸 Periode</span>':'';
    var sessVol=0;if(s.data){plan.exercises.forEach(function(ex,i){(s.data[i]||[]).forEach(function(set){var kg=parseFloat(set.kg)||0;var reps=parseFloat(set.reps)||0;sessVol+=kg*reps;});});}
    var volB=sessVol>0?'<span class="hist-pill" style="color:#5a7a3a;background:rgba(90,122,58,0.1)">🏋️ '+(sessVol>=1000?(sessVol/1000).toFixed(1)+'t':Math.round(sessVol)+'kg')+'</span>':'';
    var bwB=s.gewicht?'<span class="hist-pill" style="color:#7a5a3a;background:rgba(122,90,58,0.1)">⚖️ '+parseFloat(s.gewicht).toFixed(1)+' kg</span>':'';
    var wasserB=s.wasser?'<span class="hist-pill" style="color:#3a6a8a;background:rgba(58,106,138,0.1)">💧 '+(s.wasser%1===0?s.wasser:parseFloat(s.wasser).toFixed(2).replace(/0+$/))+' L</span>':'';
    return'<div class="card hist-card" style="border-left:3px solid '+plan.strip+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:22px">'+plan.emoji+'</span><div><div style="font-size:14px;font-weight:700">'+s.tag+' — '+plan.title+'</div><div class="caption" style="margin-top:1px">'+fmtShort(s.date)+'</div></div></div><div class="hist-pills">'+(pills||'<span class="caption">Keine Gewichte</span>')+bauchB+wasserB+periodeB+volB+bwB+'</div></div>';
  }).join("");
}

// ANALYSE
function renderAnalyse(){
  var ts=Object.values(sessions).filter(function(s){return s.tag&&!s.rest;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var count=ts.length;
  document.getElementById("analyse-sub").textContent=count+" Einheiten · "+Math.floor(count/5)+" Wochen";
  var wlKeys=Object.keys(weightLog).sort();
  var bwData=wlKeys.map(function(k){return{date:k,kg:weightLog[k]};});
  var volData=ts.map(function(s){var v=0;if(s.data){var plan=PLAN[s.tag];plan.exercises.forEach(function(ex,i){(s.data[i]||[]).forEach(function(set){v+=(parseFloat(set.kg)||0)*(parseFloat(set.reps)||0);});});}return{date:s.date,vol:v,tag:s.tag};});
  var content=document.getElementById("analyse-content");
  if(count<3){content.innerHTML='<div class="card" style="padding:20px;text-align:center"><div style="font-size:36px;margin-bottom:12px">📈</div><div style="font-size:15px;font-weight:600">Noch zu wenig Daten</div><div class="caption" style="margin-top:6px">Trage mindestens 5 Einheiten ein</div></div>';return;}
  var summaryCards='';
  if(bwData.length>=2){
    var bwFirst=bwData[0].kg;var bwLast=bwData[bwData.length-1].kg;var bwDiff=Math.round((bwLast-bwFirst)*10)/10;
    summaryCards+='<div class="card" style="padding:14px;margin-bottom:10px;display:flex;gap:14px;align-items:center"><div style="font-size:28px">⚖️</div><div style="flex:1"><div style="font-size:14px;font-weight:700">Körpergewicht</div><div class="caption" style="margin-top:2px">'+bwData[0].date.slice(5).replace("-",".")+'  →  '+bwData[bwData.length-1].date.slice(5).replace("-",".")+'</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+(bwDiff<=0?"#4a7a4a":"#b05030")+'">'+( bwDiff<=0?bwDiff:"+"+bwDiff)+' kg</div><div class="caption">'+bwFirst+' → '+bwLast+' kg</div></div></div>';
  }
  if(volData.length>=2){
    var recentVol=volData.slice(-5).reduce(function(a,b){return a+b.vol;},0)/Math.min(5,volData.length);
    var earlyVol=volData.slice(0,5).reduce(function(a,b){return a+b.vol;},0)/Math.min(5,volData.length);
    var volDiff=Math.round(recentVol-earlyVol);
    var fmt=function(v){return v>=1000?(v/1000).toFixed(1)+"t":Math.round(v)+"kg";};
    summaryCards+='<div class="card" style="padding:14px;margin-bottom:10px;display:flex;gap:14px;align-items:center"><div style="font-size:28px">🏋️</div><div style="flex:1"><div style="font-size:14px;font-weight:700">Trainingsvolumen</div><div class="caption" style="margin-top:2px">Ø pro Einheit (Trend)</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+(volDiff>=0?"#4a7a4a":"#b05030")+'">'+( volDiff>=0?"+":"")+fmt(volDiff)+'</div><div class="caption">'+fmt(earlyVol)+' → '+fmt(recentVol)+'</div></div></div>';
  }
  content.innerHTML=summaryCards;
  var cards=Object.entries(PLAN).map(function(e){
    var tag=e[0];var info=e[1];
    var tagS=ts.filter(function(s){return s.tag===tag;});
    if(tagS.length<2)return'<div class="card" style="padding:14px;margin-bottom:8px;border-left:3px solid '+info.strip+'"><div style="display:flex;align-items:center;gap:10px"><span>'+info.emoji+'</span><div style="font-size:14px;font-weight:700">'+tag+'</div></div><div class="caption" style="margin-top:6px">'+(tagS.length===0?'Noch keine Einheiten':'Nur 1 Einheit')+'</div></div>';
    var exProg=info.exercises.map(function(ex,i){var weights=tagS.map(function(s){var sets=(s.data&&s.data[i])||[];return Math.max.apply(null,sets.map(function(set){return parseFloat(set.kg)||0;}));}).filter(function(w){return w>0;});if(weights.length<2)return null;var first=weights[0];var last=weights[weights.length-1];var diff=last-first;var pct=first>0?Math.min(100,Math.max(0,Math.round((diff/first)*100))):50;return'<div class="prog-item"><div class="prog-header"><span style="font-size:13px">'+ex.name+'</span><span style="font-size:13px;font-weight:700;color:'+(diff>=0?info.strip:'#b03030')+'">'+(diff>=0?'+':'')+diff+'kg</span></div><div class="caption" style="margin-bottom:4px">'+first+'kg → '+last+'kg · '+tagS.length+'× trainiert</div><div class="prog-bar-bg"><div class="prog-bar-fill" style="width:'+pct+'%;background:'+(diff>=0?info.strip:'#b03030')+'"></div></div></div>';}).filter(Boolean).join("");
    return'<div class="card" style="padding:16px;margin-bottom:8px;border-left:3px solid '+info.strip+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:24px">'+info.emoji+'</span><div style="font-size:15px;font-weight:700;flex:1">'+tag+' — '+info.title+'</div><span class="pill" style="background:'+info.bg+';color:'+info.strip+'">'+tagS.length+'×</span></div>'+(exProg||'<div class="caption">Noch keine Gewichte</div>')+'</div>';
  }).join("");
  content.innerHTML+=cards+'<div id="ai-box"><div class="spinner-dots"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div></div>';
  var summary=ts.slice(-20).map(function(s){var plan=PLAN[s.tag];var lines=plan.exercises.map(function(ex,i){var sets=(s.data&&s.data[i])||[];var best=Math.max.apply(null,sets.map(function(set){return parseFloat(set.kg)||0;}));return best>0?ex.name+":"+best+"kg":null;}).filter(Boolean).join(", ");return s.date+" "+s.tag+": "+(lines||"keine Gewichte");}).join("\n");
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:"Du bist ein Fitness-Coach. Analysiere diese Trainingsdaten einer 25-jährigen Frau (58.6kg) die Fett abbauen und Muskeln aufbauen möchte. Gib eine kurze motivierende Analyse auf Deutsch in 3 Teilen: 1) Was läuft sehr gut, 2) Wo stagniert sie, 3) Genau 3 konkrete Empfehlungen für die nächsten 4 Wochen. Max 220 Wörter, du-Form, direkt.\n\nTrainingsdaten:\n"+summary}]})}).then(function(r){return r.json();}).then(function(data){var text=(data.content&&data.content[0]&&data.content[0].text)?data.content[0].text:"Analyse nicht verfügbar.";document.getElementById("ai-box").innerHTML='<div class="card" style="padding:18px;margin-top:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:22px">🤖</span><div style="font-size:15px;font-weight:700">KI-Auswertung</div></div><p class="ai-text">'+text.replace(/\n/g,"<br>")+'</p></div>';}).catch(function(){document.getElementById("ai-box").innerHTML='<div class="card" style="padding:18px;margin-top:10px"><div class="caption">KI-Analyse benötigt Internetverbindung.</div></div>';});
}

renderCalendar();

// Hide splash after load
window.addEventListener('load', function(){
  setTimeout(function(){
    var splash = document.getElementById('splash');
    if(splash) splash.classList.add('hide');
    setTimeout(function(){ if(splash) splash.remove(); }, 500);
  }, 800);
});

// Service Worker for offline support
if('serviceWorker' in navigator){
  var swCode = `
    const CACHE = 'training-v1';
    self.addEventListener('install', function(e){
      e.waitUntil(caches.open(CACHE).then(function(c){
        return c.addAll(['./', './index.html']);
      }));
    });
    self.addEventListener('fetch', function(e){
      e.respondWith(
        caches.match(e.request).then(function(r){
          return r || fetch(e.request).catch(function(){
            return new Response('Offline', {status: 503});
          });
        })
      );
    });
  `;
  var blob = new Blob([swCode], {type: 'application/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

// Load with fallback
if(!Object.keys(sessions).length){
  try {
    var backup = sessionStorage.getItem("ts_backup");
    if(backup) sessions = JSON.parse(backup);
  } catch(e) {}
}
if(!Object.keys(weightLog).length){
  try {
    var backup = sessionStorage.getItem("wl_backup");
    if(backup) weightLog = JSON.parse(backup);
  } catch(e) {}
}
</script>
